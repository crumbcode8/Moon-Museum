<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Guardian Gallery</title>

  <link href="https://fonts.googleapis.com/css2?family=Marcellus&family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="css/nav.css">
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="css/gallery.css">
</head>

<body class="moon-bg">

  <header class="site-header">
    <nav class="main-nav">
      <div class="logo">Moon Museum</div>
      <button class="hamburger" aria-label="Toggle navigation">
        <span></span><span></span><span></span>
      </button>
      <div class="nav-links">
        <a href="index.html">Home</a>
        <a href="gallery.html">Gallery</a>
      </div>
    </nav>
  </header>

  <main class="gallery-page">

    <header class="page-header">
      <h1>Guardian Gallery</h1>
      <p>Explore the Sailor Guardians of the Moon Kingdom.</p>
    </header>

    <section class="gallery-grid">

      <!-- Usagi -->
      <a href="player-usagi.html" class="card"
         style="--glow1:#ffb7d5; --glow2:#ffd1e8;">
        <div class="card-inner">
          <div class="card-front">
            <img src="images/usagi-front.jpeg" alt="Usagi Tsukino front card">
          </div>
          <div class="card-back">
            <img class="back-img" src="images/usagi-back.jpeg" alt="Usagi Tsukino back card">
            <div class="stats">
              <p>Power: 8</p>
              <p>Speed: 6</p>
              <p>Magic: 10</p>
            </div>
          </div>
        </div>
      </a>

      <!-- Ami -->
      <a href="player-ami.html" class="card"
         style="--glow1:#7fe7ff; --glow2:#b5f3ff;">
        <div class="card-inner">
          <div class="card-front">
            <img src="images/ami-front.jpeg" alt="Ami Mizuno front card">
          </div>
          <div class="card-back">
            <img class="back-img" src="images/ami-back.jpeg" alt="Ami Mizuno back card">
            <div class="stats">
              <p>Power: 7</p>
              <p>Speed: 8</p>
              <p>Magic: 9</p>
            </div>
          </div>
        </div>
      </a>

      <!-- Rei -->
      <a href="player-rei.html" class="card"
         style="--glow1:#ff6b6b; --glow2:#ff9b9b;">
        <div class="card-inner">
          <div class="card-front">
            <img src="images/rei-front.jpeg" alt="Rei Hino front card">
          </div>
          <div class="card-back">
            <img class="back-img" src="images/rei-back.jpeg" alt="Rei Hino back card">
            <div class="stats">
              <p>Power: 9</p>
              <p>Speed: 7</p>
              <p>Magic: 9</p>
            </div>
          </div>
        </div>
      </a>

      <!-- Makoto -->
      <a href="player-makoto.html" class="card"
         style="--glow1:#9cff8a; --glow2:#c8ffb8;">
        <div class="card-inner">
          <div class="card-front">
            <img src="images/makoto-front.jpeg" alt="Makoto Kino front card">
          </div>
          <div class="card-back">
            <img class="back-img" src="images/makoto-back.jpeg" alt="Makoto Kino back card">
            <div class="stats">
              <p>Power: 10</p>
              <p>Speed: 7</p>
              <p>Magic: 8</p>
            </div>
          </div>
        </div>
      </a>

      <!-- Minako -->
      <a href="player-minako.html" class="card"
         style="--glow1:#ffd86b; --glow2:#ffe9a3;">
        <div class="card-inner">
          <div class="card-front">
            <img src="images/minako-front.jpeg" alt="Minako Aino front card">
          </div>
          <div class="card-back">
            <img class="back-img" src="images/minako-back.jpeg" alt="Minako Aino back card">
            <div class="stats">
              <p>Power: 8</p>
              <p>Speed: 9</p>
              <p>Magic: 8</p>
            </div>
          </div>
        </div>
      </a>

    </section>

  </main>

  <script src="js/nav.js"></script>
</body>
</html>
