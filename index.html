<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sailor Moon Showcase</title>

  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="css/nav.css">
</head>

<body>

  <!-- Mobile Nav Toggle -->
  <div class="nav-toggle" onclick="document.querySelector('.main-nav').classList.toggle('show')">☰</div>

  <!-- Navigation -->
  <nav class="main-nav">
    <a href="index.html">Home</a>
    <a href="gallery.html">Gallery</a>
  </nav>

  <header class="hero">
    <h1>Sailor Moon Character Showcase</h1>
    <p>Explore the Sailor Guardians and learn about their powers, personalities, and stories.</p>
  </header>

  <!-- Preview Cards -->
  <section class="preview-section">
    <h2>Featured Guardians</h2>

    <div class="preview-grid">

      <div class="preview-card">
        <img src="images/usagi-front.jpeg" alt="Usagi Tsukino">
        <h3>Usagi Tsukino</h3>
        <a href="player-usagi.html" class="card-btn">View Profile</a>
      </div>

      <div class="preview-card">
        <img src="images/rei-front.jpeg" alt="Rei Hino">
        <h3>Rei Hino</h3>
        <a href="player-rei.html" class="card-btn">View Profile</a>
      </div>

      <div class="preview-card">
        <img src="images/ami-front.jpeg" alt="Ami Mizuno">
        <h3>Ami Mizuno</h3>
        <a href="player-ami.html" class="card-btn">View Profile</a>
      </div>

    </div>
  </section>

</html>
